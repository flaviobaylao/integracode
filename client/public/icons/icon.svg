<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#1a2332"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Top accent bar -->
  <rect x="80" y="80" width="352" height="8" rx="4" fill="url(#accent)" opacity="0.6"/>
  <!-- Letter I — vertical bar -->
  <rect x="224" y="120" width="64" height="272" rx="12" fill="url(#accent)"/>
  <!-- Letter I — top horizontal -->
  <rect x="160" y="120" width="192" height="52" rx="12" fill="url(#accent)"/>
  <!-- Letter I — bottom horizontal -->
  <rect x="160" y="340" width="192" height="52" rx="12" fill="url(#accent)"/>
  <!-- Bottom accent bar -->
  <rect x="80" y="424" width="352" height="8" rx="4" fill="url(#accent)" opacity="0.6"/>
</svg>
