<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Limpando Cache - Sistema Integra</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #52B788 0%, #2D6A4F 100%);
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 500px;
            text-align: center;
        }
        h1 {
            color: #2D6A4F;
            margin-bottom: 20px;
        }
        .status {
            font-size: 18px;
            color: #333;
            margin: 20px 0;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #52B788;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .success {
            color: #2D6A4F;
            font-weight: bold;
        }
        .log {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            text-align: left;
            max-height: 200px;
            overflow-y: auto;
        }
        .log-item {
            margin: 5px 0;
            padding: 5px;
            border-left: 3px solid #52B788;
            padding-left: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔄 Limpando Cache</h1>
        <div class="spinner"></div>
        <div class="status" id="status">Iniciando limpeza...</div>
        <div class="log" id="log"></div>
    </div>

    <script>
        const log = document.getElementById('log');
        const status = document.getElementById('status');
        
        function addLog(message) {
            const item = document.createElement('div');
            item.className = 'log-item';
            item.textContent = '✓ ' + message;
            log.appendChild(item);
            log.scrollTop = log.scrollHeight;
        }

        async function limparTudo() {
            try {
                // 1. Desregistrar Service Worker
                status.textContent = 'Desregistrando Service Worker...';
                if ('serviceWorker' in navigator) {
                    const registrations = await navigator.serviceWorker.getRegistrations();
                    for (let registration of registrations) {
                        await registration.unregister();
                        addLog('Service Worker desregistrado');
                    }
                }

                // 2. Limpar todos os caches
                status.textContent = 'Limpando caches...';
                if ('caches' in window) {
                    const cacheNames = await caches.keys();
                    for (let cacheName of cacheNames) {
                        await caches.delete(cacheName);
                        addLog(`Cache "${cacheName}" removido`);
                    }
                }

                // 3. Limpar localStorage
                status.textContent = 'Limpando localStorage...';
                localStorage.clear();
                addLog('localStorage limpo');

                // 4. Limpar sessionStorage
                status.textContent = 'Limpando sessionStorage...';
                sessionStorage.clear();
                addLog('sessionStorage limpo');

                // 5. Sucesso!
                status.innerHTML = '<span class="success">✅ Limpeza concluída!</span>';
                addLog('Redirecionando para Auditoria de Check-ins...');

                // 6. Aguardar 2 segundos e redirecionar
                setTimeout(() => {
                    window.location.href = '/auditoria-checkins';
                }, 2000);

            } catch (error) {
                status.textContent = '❌ Erro: ' + error.message;
                addLog('ERRO: ' + error.message);
                
                // Se der erro, redireciona mesmo assim após 3 segundos
                setTimeout(() => {
                    window.location.href = '/auditoria-checkins';
                }, 3000);
            }
        }

        // Iniciar limpeza automaticamente
        limparTudo();
    </script>
</body>
</html>
