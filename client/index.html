—<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- SEO & Description -->
    <meta name="description" content="Integra 2.0 — Sistema de gestão de vendas, entregas e rotas para Honest Sucos" />
    <meta name="author" content="Honest Sucos" />
    <meta name="robots" content="noindex, nofollow" />

    <!-- PWA Theme -->
    <meta name="theme-color" content="#10b981" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#059669" media="(prefers-color-scheme: light)" />
    <meta name="color-scheme" content="dark light" />

    <!-- Apple PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Integra" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Open Graph -->
    <meta property="og:title" content="Integra 2.0 — Honest Sucos" />
    <meta property="og:description" content="Sistema de gestão de vendas, entregas e rotas" />
    <meta property="og:type" content="website" />

    <!-- Favicon & Icons -->
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon.svg" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon.svg" />

    <!-- Apple Splash Screens (dark) -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- PWA Manifest — formato moderno (.webmanifest) -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <title>Integra 2.0 — Honest Sucos</title>

    <!-- Preconnect para Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Fonts otimizadas — apenas Inter e JetBrains Mono -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Prevent FOUC — dark mode instantâneo -->
    <script>
      (function() {
        try {
          var stored = localStorage.getItem('integra-theme');
    if (stored === 'dark') {
      document.documentElement.classList.add('dark');
    }
    // Padrão: modo claro
        } catch(e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>

    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .then(function(reg) {
              console.log('[SW] Registrado:', reg.scope);
              // Auto-update a cada 60s
              setInterval(function() { reg.update(); }, 60000);
            })
            .catch(function(err) {
              console.warn('[SW] Registro falhou:', err);
            });

          // Reload quando novo SW assume o controle
          var swRefreshing = false;
          navigator.serviceWorker.addEventListener('controllerchange', function() {
            if (!swRefreshing) {
              swRefreshing = true;
              window.location.reload();
            }
          });
        });
      }
    </script>

    <!-- Auto-atualizacao: detecta um novo build (hash do bundle) e recarrega sozinho -->
    <script>
      (function () {
        function currentBundle() {
          var s = document.querySelector('script[src*="/assets/index-"]');
          return s ? s.getAttribute('src').split('?')[0] : null;
        }
        var reloading = false;
        var lastActivity = Date.now();
        ['click', 'keydown', 'touchstart', 'mousedown'].forEach(function (ev) {
          window.addEventListener(ev, function () { lastActivity = Date.now(); }, { passive: true });
        });
        async function checkUpdate() {
          if (reloading) return;
          try {
            var html = await fetch('/index.html', { cache: 'no-store' }).then(function (r) { return r.text(); });
            var m = html.match(/\/assets\/index-[A-Za-z0-9_-]+\.js/);
            var latest = m ? m[0] : null;
            var current = currentBundle();
            if (latest && current && latest !== current) {
              reloading = true;
              try { if (window.caches) { var ks = await caches.keys(); await Promise.all(ks.map(function (k) { return caches.delete(k); })); } } catch (e) {}
              location.reload();
            }
          } catch (e) {}
        }
        // Recarrega ao voltar para o app, ou quando ocioso/em segundo plano (nao interrompe quem esta digitando)
        setInterval(function () { if (document.hidden || (Date.now() - lastActivity) > 60000) checkUpdate(); }, 120000);
        document.addEventListener('visibilitychange', function () { if (!document.hidden) checkUpdate(); });
        window.addEventListener('focus', checkUpdate);
        window.addEventListener('load', function () { setTimeout(checkUpdate, 8000); });
      })();
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
